version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: parkease-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: parkease
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: parkease-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: parkease-backend
    restart: always
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/parkease?schema=public
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=http://localhost:5173
      - JWT_ACCESS_SECRET=super_access_secret_key_123_456_789
      - JWT_REFRESH_SECRET=super_refresh_secret_key_123_456_789
      - STRIPE_SECRET_KEY=sk_test_mock_secret
      - STRIPE_WEBHOOK_SECRET=whsec_mock_secret
      - AWS_ACCESS_KEY_ID=mock_aws_key
      - AWS_SECRET_ACCESS_KEY=mock_aws_secret
      - S3_BUCKET_NAME=parkease-mock-bucket
      - FROM_EMAIL=no-reply@parkease.local
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: parkease-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_SOCKET_URL=http://localhost:5000
      - VITE_STRIPE_PUBLISHABLE_KEY=pk_test_mock_publishable
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
